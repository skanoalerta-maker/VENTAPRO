name: skano_nuevo
description: "SKANO - Reporte y detección de vehículos robados"
publish_to: 'none'

version: 1.0.0+12

environment:
  sdk: ">=3.10.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^3.4.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.1.0
  cloud_functions: ^5.0.0

  google_maps_flutter: ^2.14.0
  location: ^8.0.1
  pedometer: ^4.2.0

  camera: ^0.10.5+3
  image_picker: ^1.0.7

  google_mlkit_face_detection: ^0.13.1
  google_mlkit_text_recognition: ^0.15.1

  path_provider: ^2.1.4
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  package_info_plus: ^9.0.0
  intl: ^0.19.0

  emailjs: ^1.1.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/skano_fg.png"
  adaptive_icon_background: "#00000000"
  adaptive_icon_foreground: "assets/icon/skano_fg.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/skano_fg.png
    - assets/map_style_dark.json
    - assets/data/comunas-regiones.json